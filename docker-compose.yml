services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-engageflow}
      - DB_USERNAME=${DB_USERNAME:-engageflow}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - engageflow

  node:
    image: node:lts-alpine
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules_data:/var/www/html/node_modules
    command: sh -c "tail -f /dev/null"
    networks:
      - engageflow

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-engageflow}
      POSTGRES_USER: ${DB_USERNAME:-engageflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-engageflow} -d ${DB_DATABASE:-engageflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - engageflow

volumes:
  db_data:
    driver: local
  node_modules_data:
    driver: local
  vendor_data:
    driver: local

networks:
  engageflow:
    driver: bridge
